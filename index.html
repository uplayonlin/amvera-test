<!DOCTYPE html>
<html lang="ru">
<head>

    <title>Amvera Test</title>

        body {

            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);

            font-weight: bold;

<body>

        <h1>🎉 Amvera работает!</h1>

        <p>Если вы видите эту страницу - значит всё настроено правильно.</p>
        <p><a href="/health" style="color: #fbbf24;">Проверить /health endpoint</a></p>

</html>
